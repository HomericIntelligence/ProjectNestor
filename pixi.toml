[project]
name = "projectnestor"
version = "0.1.0"
description = "Research, ideation, and search for HomericIntelligence"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
cmake = ">=3.20"
ninja = ">=1.11"
cxx-compiler = ">=1.7"
gtest = ">=1.14"
clang-tools = ">=17"
gcovr = ">=7"
pre-commit = ">=3"

[tasks]
build = "cmake --preset debug && cmake --build --preset debug"
test = "ctest --preset debug --output-on-failure"
lint = "./scripts/lint.sh"
format = "./scripts/format.sh"
coverage = "cmake --preset coverage && cmake --build --preset coverage && ./scripts/coverage.sh"
