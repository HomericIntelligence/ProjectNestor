name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build clang-format container
        run: podman build -t projectnestor-clang-format -f Dockerfile.clang-format .
      - name: Check formatting
        run: ./scripts/format.sh --check

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y ninja-build clang clang-tidy
      - name: Configure
        run: cmake --preset debug -DProjectNestor_ENABLE_CLANG_TIDY=ON
      - name: Build
        run: cmake --build --preset debug

  check-all:
    name: All Static Analysis Checks
    runs-on: ubuntu-24.04
    needs: [clang-format, clang-tidy]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.clang-format.result }}" != "success" ] || \
             [ "${{ needs.clang-tidy.result }}" != "success" ]; then
            echo "Static analysis failed"; exit 1
          fi
          echo "All checks passed"
