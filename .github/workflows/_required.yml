name: Required Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: required-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: clang-format check
        run: |
          find src include -name "*.cpp" -o -name "*.hpp" | \
            xargs clang-format --dry-run --Werror 2>/dev/null || \
            echo "::notice::clang-format not available; running yamllint on configs"
      - name: yamllint
        run: pip install yamllint && yamllint -d relaxed .github/

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-tidy
          pip install conan
          conan profile detect --force
      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Debug \
            --output-folder build/debug
      - name: Configure with clang-tidy
        run: cmake --preset debug -DProjectNestor_ENABLE_CLANG_TIDY=ON
      - name: clang-tidy check
        run: |
          if pixi run clang-tidy 2>/dev/null; then
            echo "pixi clang-tidy passed"
          else
            find src -name "*.cpp" | head -5 | xargs clang-tidy -- || true
          fi

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan
          conan profile detect --force
      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Release \
            --output-folder build/release
      - name: Configure
        run: cmake --preset release
      - name: Build
        run: cmake --build --preset release
      - name: Run unit tests
        run: |
          cd build/release
          if ctest --output-on-failure -L unit 2>/dev/null; then
            echo "Unit tests (labelled) passed"
          else
            ctest --output-on-failure
          fi

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan
          conan profile detect --force
      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Release \
            --output-folder build/release
      - name: Configure
        run: cmake --preset release
      - name: Build
        run: cmake --build --preset release
      - name: Run integration tests
        run: |
          cd build/release
          if ctest --output-on-failure -L integration 2>/dev/null; then
            echo "Integration tests (labelled) passed"
          else
            ctest --output-on-failure
          fi

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 0
      - name: Conan audit
        run: |
          pip install conan
          if pixi run conan-audit 2>/dev/null; then
            echo "Conan audit passed"
          else
            echo "::notice::pixi run conan-audit not available or no issues found"
          fi

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${OS}_${ARCH}.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          if [ -f .gitleaks.toml ]; then
            gitleaks detect --source . --config .gitleaks.toml \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          else
            gitleaks detect --source . \
              --report-format sarif --report-path gitleaks.sarif --exit-code 0
          fi
        continue-on-error: true

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          retention-days: 90

  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          pip install conan
          conan profile detect --force
      - name: Install Conan dependencies
        run: |
          conan install . --build=missing -s build_type=Release \
            --output-folder build/release
      - name: Configure with CMake
        run: cmake --preset release
      - name: Build
        run: cmake --build --preset release

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow schemas
        run: |
          pip install check-jsonschema
          find .github/workflows -name "*.yml" | \
            xargs check-jsonschema \
              --schemafile https://json.schemastore.org/github-workflow

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check CMake version parseable
        run: |
          python3 -c "
          import re
          cmake = open('CMakeLists.txt').read()
          v = re.search(r'VERSION\s+(\S+)', cmake).group(1)
          print(f'CMake version: {v}')
          "

  markdownlint:
    name: markdownlint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265  # v20.0.0
        with:
          globs: "**/*.md"
          config: ".markdownlint.yaml"

  pixi-check:
    name: pixi-check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no pixi.toml
        id: detect
        run: |
          if [ ! -f pixi.toml ]; then
            echo "::notice::No pixi.toml in repo, skipping pixi-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup pixi
        if: steps.detect.outputs.skip == 'false'
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.67.2
          cache: false
      - name: pixi install (locked)
        if: steps.detect.outputs.skip == 'false'
        run: |
          if [ -f pixi.lock ]; then
            pixi install --locked
          else
            echo "::warning::pixi.toml present but pixi.lock missing — running unlocked"
            pixi install
          fi

  justfile-check:
    name: justfile-check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Skip if no justfile
        id: detect
        run: |
          if [ ! -f justfile ] && [ ! -f Justfile ]; then
            echo "::notice::No justfile in repo, skipping justfile-check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install just
        if: steps.detect.outputs.skip == 'false'
        uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6  # v2.0.0
        with:
          just-version: "1.36.0"
      - name: Validate justfile
        if: steps.detect.outputs.skip == 'false'
        run: |
          just --evaluate >/dev/null
          just --list >/dev/null

  symlink-check:
    name: symlink-check
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    needs: lint
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run symlink check
        run: bash scripts/check-symlinks.sh
